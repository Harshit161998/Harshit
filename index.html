<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Actress Do You Look Like?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#fff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:700px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:25px;
    font-size:18px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#e63956;
}

#result{
    display:none;
    margin-top:30px;
}

#result h2{
    color:#ff2d55;
    margin-bottom:20px;
}

.images{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.images img{
    width:180px;
    height:240px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.images img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>✨ Celebrity Look-Alike Test ✨</h1>

    <p>
        Click the button below to know which actress you look like.
    </p>

    <button onclick="showResult()">
        Find My Look-Alike
    </button>

    <div id="result">
        <h2>😍 You look like Parineeti Chopra! 😍</h2>

        <div class="images">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/Parineeti_Chopra_promoting_Hasee_Toh_Phasee.jpg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Parineeti_Chopra_at_Golmaal_Again_promotions.jpg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Parineeti_Chopra_at_the_launch_of_Fit_to_Fight.jpg">
        </div>
    </div>
</div>

<script>
function showResult(){
    document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
