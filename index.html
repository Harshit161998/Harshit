<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Celebrity Look-Alike Scanner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:90%;
    max-width:700px;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    color:#222;
    margin-bottom:15px;
}

.subtitle{
    color:#666;
    margin-bottom:35px;
}

button{
    background:#0078ff;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#loading{
    display:none;
    margin-top:35px;
}

.bar{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00c853,#00e676);
    transition:.2s;
}

#status{
    color:#444;
    font-size:18px;
}

#result{
    display:none;
    animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.result-title{
    margin:25px 0;
    color:#ff2d55;
    font-size:32px;
}

.images{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.images img{
    width:180px;
    height:240px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.confidence{
    margin:15px 0 25px;
    font-size:22px;
    color:#444;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Celebrity Face Scanner</h1>

<p class="subtitle">
Click the button below to discover which Bollywood actress you resemble.
</p>

<button id="scanBtn" onclick="startScan()">
🔍 Start AI Scan
</button>

<div id="loading">

<h2>Scanning Face...</h2>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<p id="status">Initializing AI Engine...</p>

</div>

<div id="result">

<h2 class="result-title">
🎉 Match Found!
</h2>

<div class="confidence">
You look like <span style="color:#ff2d55;">Parineeti Chopra</span><br><br>

AI Match Confidence:
<b>98.7%</b>
</div>

<div class="images">

<div class="images">

<img src="scanner/images/p1.jpg" alt="Parineeti 1">

<img src="scanner/images/p2.jpg" alt="Parineeti 2">

<img src="scanner/images/p3.jpg" alt="Parineeti 3">

</div>

</div>

</div>

</div>

<script>

function startScan(){

document.getElementById("scanBtn").style.display="none";
document.getElementById("loading").style.display="block";

let progress=0;

let messages=[
"Initializing AI Engine...",
"Detecting Face...",
"Analyzing Facial Structure...",
"Comparing Eyes...",
"Matching Smile...",
"Finding Bollywood Database...",
"Almost There..."
];

let index=0;

let interval=setInterval(function(){

progress++;

document.getElementById("progress").style.width=progress+"%";

if(progress%15==0 && index<messages.length-1){
index++;
document.getElementById("status").innerHTML=messages[index];
}

if(progress>=100){

clearInterval(interval);

setTimeout(function(){

document.getElementById("loading").style.display="none";
document.getElementById("result").style.display="block";

},500);

}

},55);

}

</script>

</body>
</html>
